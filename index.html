<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Manajemen Aset</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="form-container login-container">
                <div class="form-header">
                    <h1>Selamat Datang</h1>
                    <p>Masuk ke Sistem Manajemen Aset</p>
                </div>

                <form id="loginForm" class="form">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            name="email" 
                            placeholder="Masukkan email Anda" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            name="password" 
                            placeholder="Masukkan password Anda" 
                            required
                        >
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <label for="rememberMe">Ingat saya</label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-login">Masuk</button>
                </form>

                <div class="form-footer">
                    <p>Belum punya akun? <a href="register.html" class="link">Daftar sekarang</a></p>
                </div>

                <div id="loginAlert" class="alert alert-danger" style="display: none;"></div>
            </div>

            <div class="illustration-container">
                <div class="illustration">
                    <div class="icon-large">
                        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="100" cy="60" r="40" fill="#4a90e2"/>
                            <path d="M 50 120 Q 100 140 150 120 L 150 180 Q 100 200 50 180 Z" fill="#4a90e2"/>
                        </svg>
                    </div>
                    <h2>Kelola Aset Dengan Mudah</h2>
                    <p>Sistem manajemen aset terpadu untuk efisiensi maksimal</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

                const demoBorrowRequests = [];

                console.log('Demo borrow requests initialized:', demoBorrowRequests);
            }
        }

        // Handle login form
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const alertDiv = document.getElementById('loginAlert');

            console.log('Login attempt:', { email, password });

            // Get users from localStorage
            const users = JSON.parse(localStorage.getItem('users')) || [];
            console.log('Available users:', users);
            
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                console.log('Login successful:', user);
                // Login successful
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                // Redirect berdasarkan role
                if (user.role === 'admin') {
                    window.location.href = 'dashboard-admin.html';
                } else {
                    window.location.href = 'dashboard-user.html';
                }
            } else {
                console.log('Login failed - user not found');
                // Login failed
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'Email atau password salah!';
                document.getElementById('loginPassword').value = '';
            }
        });

        // Initialize on page load
        window.addEventListener('load', function() {
            console.log('Login page loaded - initializing demo data');
            initializeDemoData();

            // Check if user already logged in
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                const user = JSON.parse(currentUser);
                console.log('User already logged in:', user);
                if (user.role === 'admin') {
                    window.location.href = 'dashboard-admin.html';
                } else {
                    window.location.href = 'dashboard-user.html';
                }
            }
        });

        // Debug: tampilkan data saat page load
        console.log('Index.html loaded');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Sistem Manajemen Aset</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="form-container register-container">
                <div class="form-header">
                    <h1>Buat Akun</h1>
                    <p>Daftar untuk memulai menggunakan sistem</p>
                </div>

                <form id="registerForm" class="form">
                    <div class="form-group">
                        <label for="registerName">Nama Lengkap</label>
                        <input 
                            type="text" 
                            id="registerName" 
                            name="name" 
                            placeholder="Masukkan nama lengkap Anda" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input 
                            type="email" 
                            id="registerEmail" 
                            name="email" 
                            placeholder="Masukkan email Anda" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <input 
                            type="password" 
                            id="registerPassword" 
                            name="password" 
                            placeholder="Buat password yang kuat" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="registerConfirmPassword">Konfirmasi Password</label>
                        <input 
                            type="password" 
                            id="registerConfirmPassword" 
                            name="confirmPassword" 
                            placeholder="Konfirmasi password" 
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-register">Daftar</button>
                </form>

                <div class="form-footer">
                    <p>Sudah punya akun? <a href="index.html" class="link">Masuk di sini</a></p>
                </div>

                <div id="registerAlert" class="alert alert-danger" style="display: none;"></div>
                <div id="registerSuccess" class="alert alert-success" style="display: none;"></div>
            </div>

            <div class="illustration-container">
                <div class="illustration">
                    <div class="icon-large">
                        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="100" cy="60" r="40" fill="#2ecc71"/>
                            <path d="M 70 120 L 90 140 L 140 90" stroke="#2ecc71" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h2>Bergabunglah Sekarang</h2>
                    <p>Mulai kelola aset Anda dengan mudah dan efisien</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Handle register form
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const role = document.getElementById('registerRole').value;
            
            const alertDiv = document.getElementById('registerAlert');
            const successDiv = document.getElementById('registerSuccess');

            // Validation
            if (password !== confirmPassword) {
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'Password tidak cocok!';
                return;
            }

            if (password.length < 6) {
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'Password minimal 6 karakter!';
                return;
            }

            // Get users from localStorage
            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            // Check if email already exists
            if (users.find(u => u.email === email)) {
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'Email sudah terdaftar!';
                return;
            }

            // Add new user
            const newUser = {
                id: Date.now(),
                name: name,
                email: email,
                password: password,
                role: role,
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            // Show success message
            alertDiv.style.display = 'none';
            successDiv.style.display = 'block';
            successDiv.textContent = 'Pendaftaran berhasil! Anda akan diarahkan ke halaman login dalam 2 detik...';

            // Redirect to login
            setTimeout(function() {
                window.location.href = 'index.html';
            }, 2000);
        });

        // Initialize with demo data if empty
        window.addEventListener('load', function() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.length === 0) {
                const demoUsers = [
                    {

                    },
                    {
                        id: 2,

                        email: 'user@example.com',
                        password: 'user123',
                        role: 'user',
                        createdAt: new Date().toISOString()
                    }
                ];
                localStorage.setItem('users', JSON.stringify(demoUsers));

                // Initialize assets
                const demoAssets = [
                    {

                    },
                    {

                    },
                    {
                        id: 3,

                        kategori: 'Presentasi',
                        jumlah: 2,
                        jumlahDipinjam: 0,
                        kondisi: 'Baik',
                        lokasi: 'Ruang Meeting',
                        status: 'Tersedia',
                        peminjam: null,

                    },
                    {
                        id: 4,

                    },
                    {

                ];
                localStorage.setItem('assets', JSON.stringify(demoAssets));
            }
        });
    </script>
</body>
</html>
